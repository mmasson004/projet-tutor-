<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploration Pyrénées - Tourisme Durable</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="app-container">
        <!-- Map Container -->
        <div id="map"></div>

        <button id="load-neighbors-btn" class="glass-btn hidden"
            style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; background: var(--color-primary); color: white; border: none; box-shadow: var(--glass-shadow); transition: all 0.3s ease;">
            🗺️ Charger les zones voisines
        </button>
        <!-- ⚙️ Floating Appearance Button + Panel -->
        <button id="settings-toggle-btn" class="glass-btn icon-btn"
            style="position: absolute; top: 255px; left: 10px; z-index: 1001; width: 34px; height: 34px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.3s ease; background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);">⚙️</button>

        <div id="appearance-settings-panel" class="glass-panel hidden"
            style="position: absolute; top: 255px; left: 55px; width: 280px; padding: 20px; z-index: 1001; transition: all 0.3s ease;">
            <h3
                style="font-size: 0.9rem; margin-bottom: 12px; color: var(--color-primary); text-transform: uppercase; letter-spacing: 0.05em; display: flex; justify-content: space-between; align-items: center;">
                🎨 Apparence
                <span id="close-settings" style="cursor:pointer; opacity: 0.6; font-size: 1.2rem;">✕</span>
            </h3>

            <div class="filter-section">
                <label
                    style="color: #fff; font-size: 0.85rem; display: flex; align-items: center; justify-content: space-between;">
                    <span>Épaisseur des tracés</span>
                    <span id="path-weight-value" style="color: var(--color-primary); font-weight: bold;">100%</span>
                </label>
                <input type="range" id="path-weight-slider" min="0" max="300" value="100" step="10"
                    style="width: 100%; margin-top: 8px; cursor: pointer; accent-color: var(--color-primary);">
            </div>

            <div class="filter-section"
                style="margin-top: 15px; display: flex; align-items: center; justify-content: space-between;">
                <label style="color: #fff; font-size: 0.85rem;">Couleur de la zone</label>
                <input type="color" id="polygon-color-picker" value="#3388ff"
                    style="cursor: pointer; border: none; width: 40px; height: 25px; padding: 0; background: none; border-radius: 4px;">
            </div>

            <!-- Ajout de la sélection du serveur Overpass -->
            <div class="filter-section" style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px;">
                <label style="color: #fff; font-size: 0.85rem;">Serveur Overpass API</label>
                <select id="overpass-server-select"
                    style="width: 100%; padding: 6px; border-radius: 4px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; cursor: pointer;">
                    <option value="https://overpass.private.coffee/api/interpreter">Private Coffee</option>
                    <option value="https://overpass-api.de/api/interpreter" selected>overpass-api.de (Officiel)</option>
                    <option value="https://overpass.kumi.systems/api/interpreter">Kumi Systems</option>
                    <option value="https://overpass.osm.ch/api/interpreter">osm.ch (Suisse)</option>
                </select>
            </div>

            <div class="filter-section" style="margin-top: 15px;">
                <button id="force-refresh-btn"
                    style="width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(59,130,246,0.4); background: rgba(59,130,246,0.12); color: #93c5fd; font-size: 0.85rem; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 6px;">
                    🔄 Rafraîchir cette zone
                </button>
                <span style="font-size: 0.7rem; color: var(--color-text-muted); margin-top: 4px; display: block;">Vide
                    le cache de la zone active et re-télécharge</span>
                <button id="force-reset-all-btn"
                    style="width: 100%; margin-top: 8px; padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); color: #fca5a5; font-size: 0.78rem; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 5px;">
                    🗑️ Reset complet (tout le cache)
                </button>
            </div>
        </div>

        <!-- Macro View Overlay (Statistics & Instructions) -->
        <div id="macro-overlay" class="glass-panel visible">
            <header style="display: flex; justify-content: space-between; align-items: start;">
                <div>
                    <h1>Exploration du Territoire</h1>
                </div>
                <button id="minimize-macro-btn" class="icon-btn minimize-btn" title="Réduire/Agrandir">−</button>
            </header>
            <div id="macro-stats" class="stats-grid">
                <!-- Stats will be injected here -->
                <div class="stat-item empty">
                    <span class="stat-value">--</span>
                    <span class="stat-label">Points d'Intérêt</span>
                </div>
            </div>

        </div>

        <!-- Floating Filters Box (Top Center) -->
        <div id="filters-floating-box" class="glass-panel">
            <div style="display: flex; gap: 8px; align-items: flex-start;">
                <div class="filter-card" style="flex: 1; margin-top: 0;">
                    <button id="toggle-filters-btn" class="filter-toggle-btn">
                        <span class="btn-label">🛠️ Catégories POIs</span>
                        <span class="filter-badge badge--all" id="filter-badge-categories">--/--</span>
                        <span class="btn-chevron">▾</span>
                    </button>
                    <div id="macro-filters-content" class="filter-card-body"
                        style="display: none; max-height: 250px; overflow-y: auto;">
                        <button id="deselect-all-btn" class="filter-action-btn">Tout cocher / décocher</button>
                    </div>
                </div>

                <div class="filter-card" style="flex: 1; margin-top: 0;">
                    <button id="toggle-path-filters-btn" class="filter-toggle-btn">
                        <span class="btn-label">🗺️ Chemins</span>
                        <span class="filter-badge badge--all" id="filter-badge-paths">--/--</span>
                        <span class="btn-chevron">▾</span>
                    </button>
                    <div id="path-filters-content" class="filter-card-body"
                        style="display: none; max-height: 250px; overflow-y: auto;">
                        <button id="deselect-all-paths-btn" class="filter-action-btn">Tout cocher / décocher</button>
                        <!-- Path Checkboxes injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Micro View Sidebar (POI List & Details) -->
    <aside id="micro-sidebar" class="glass-panel">
        <div class="sidebar-header">
            <h2>Points d'Intérêt</h2>
            <button id="close-micro-view" class="icon-btn" aria-label="Retour à la vue macro">✕</button>
        </div>

        <div class="filters-container" id="micro-filters-container">
            <input type="text" id="poi-search-input" placeholder="Rechercher par nom..." class="search-input"
                style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white;">
        </div>

        <div id="poi-list" class="poi-list">
            <p class="empty-state">Sélectionnez une zone pour voir les lieux.</p>
        </div>
    </aside>


    <!-- Presets Panel (Tabbed) -->
    <div id="presets-panel" class="glass-panel">
        <div class="presets-tabs"
            style="display: flex; justify-content: space-between; align-items: center; padding-right: 10px;">
            <div style="display: flex; flex: 1; overflow-x: auto;">
                <button class="tab-btn active" data-tab="countries">Pays</button> <button class="tab-btn"
                    data-tab="national">Zones protegées</button>
                <button class="tab-btn" data-tab="regional">Parcs Régionaux</button>
                <span id="admin-tabs-btns" style="display: contents;"></span>
                <button class="tab-btn" data-tab="cities">Villes</button>
            </div>
            <button id="minimize-presets-btn" class="icon-btn minimize-btn" title="Réduire/Agrandir"
                style="padding: 4px 8px;">−</button>
        </div>

        <div id="countries-content" class="tab-content active">
            <div class="search-container" style="padding: 10px 0;">
                <input type="text" id="country-search-input" placeholder="Rechercher un pays..."
                    style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white;">
            </div>
            <div id="selected-country-summary" class="country-active-card hidden"></div>
            <div id="countries-results" class="presets-list"></div>
        </div>
        <div id="national-content" class="tab-content">
            <div id="national-list" class="presets-list">
                <!-- Protected areas injected here -->
            </div>
        </div>

        <div id="regional-content" class="tab-content">
            <div id="regional-list" class="presets-list">
                <!-- Regional Parks injected here -->
            </div>
        </div>

        <div id="admin-tabs-contents"></div>

        <div id="cities-content" class="tab-content">
            <div class="search-container" style="padding: 10px 0;">
                <input type="text" id="city-search-input" placeholder="Choisissez d'abord un pays..." disabled
                    style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white;">
            </div>
            <div id="cities-results" class="presets-list"></div>
        </div>
    </div>

    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <!-- Application Modules -->
    <script type="module" src="app.js"></script>
</body>

</html>
